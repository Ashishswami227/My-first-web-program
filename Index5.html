<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini E-Commerce Store</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f6f9; padding: 20px; }
        .store-container { max-width: 900px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; background: #111827; color: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; border: 1px solid #e5e7eb; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .product-card h3 { margin-bottom: 10px; color: #1f2937; }
        .price { color: #059669; font-weight: bold; margin-bottom: 15px; font-size: 1.2rem; }
        .btn { background: #2563eb; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:hover { background: #1d4ed8; }
        .cart-status { background: #ef4444; padding: 5px 10px; border-radius: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="store-container">
        <header>
            <h1>My E-Commerce Shop</h1>
            <div>Cart Items: <span id="cart-count" class="cart-status">0</span></div>
        </header>

        <div class="products-grid">
            <div class="product-card">
                <h3>Wireless Headphones</h3>
                <p class="price">$99.00</p>
                <button class="btn" onclick="addToCart('Wireless Headphones')">Add to Cart</button>
            </div>
            <div class="product-card">
                <h3>Smart Fitness Watch</h3>
                <p class="price">$149.00</p>
                <button class="btn" onclick="addToCart('Smart Fitness Watch')">Add to Cart</button>
            </div>
        </div>
        
        <button class="btn" style="margin-top: 30px; background: #059669;" onclick="checkout()">Proceed to Checkout</button>
    </div>

    <script>
        let cart = [];

        function addToCart(productName) {
            cart.push(productName);
            document.getElementById('cart-count').innerText = cart.length;
            alert(productName + " added to cart!");
        }

        async function checkout() {
            if(cart.length === 0) return alert("Your cart is empty!");
            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: cart })
                });
                alert("Order Placed Successfully!");
                cart = [];
                document.getElementById('cart-count').innerText = 0;
            } catch(err) {
                alert("Checkout Complete (Simulated Server Handshake)");
            }
        }
    </script>
</body>
</html>
